name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'okzhu-al/slash-desktop'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            target: aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            bundle: dmg

          - os: windows-2022
            platform: windows
            target: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: apps/python-sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Import Apple Certificate (macOS only)
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build Python Sidecar
        working-directory: apps/python-sidecar
        env:
          PYINSTALLER_CODESIGN_IDENTITY: "${{ matrix.platform == 'macos' && 'Developer ID Application: Jasper Zhu (H83XQSDL83)' || '' }}"
          PYINSTALLER_ENTITLEMENTS_FILE: "${{ matrix.platform == 'macos' && '../desktop/src-tauri/entitlements.plist' || '' }}"
        run: python build.py

      - name: Install Sidecar to Tauri binaries
        shell: bash
        run: |
          SRC_SIDECAR="apps/python-sidecar/dist/slash-sidecar-${{ matrix.target }}"
          DEST_DIR="apps/desktop/src-tauri/binaries"
          DEST_SIDECAR="$DEST_DIR/slash-sidecar-${{ matrix.target }}"
          
          # 1. 强力校验源侧边栏目录是否存在，不存在则抛出错误并使 workflow 失败
          if [ ! -d "$SRC_SIDECAR" ]; then
            echo "❌ [Error] Compiled sidecar directory not found: $SRC_SIDECAR"
            exit 1
          fi
          
          # 2. 清理可能残留的脏文件目标目录
          if [ -d "$DEST_SIDECAR" ]; then
            echo "🧹 [Clean] Removing existing sidecar at $DEST_SIDECAR"
            rm -rf "$DEST_SIDECAR"
          fi
          
          # 3. 复制
          mkdir -p "$DEST_DIR"
          cp -r "$SRC_SIDECAR" "$DEST_DIR/"
          echo "✨ [Install] Sidecar installed successfully to $DEST_SIDECAR"

      - name: Verify Sidecar directory
        shell: bash
        run: |
          echo "=== Sidecar binaries ready for Tauri ==="
          ls -la apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/
          du -sh apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Node.js dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri Desktop App
        working-directory: apps/desktop
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # 包含动态嵌入 sidecar 配置参数进行构建打包
          pnpm tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle }} --config '{"bundle":{"resources":["binaries/slash-sidecar-${{ matrix.target }}"]}}'

      - name: Create & Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Slash ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: |
            target/**/bundle/dmg/*.dmg
            target/**/bundle/nsis/*.exe
