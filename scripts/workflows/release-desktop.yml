name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'okzhu-al/slash-desktop'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            target: aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            bundle: dmg

          - os: windows-2022
            platform: windows
            target: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: apps/python-sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib dmgbuild

      - name: Import Apple Certificate (macOS only)
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build Python Sidecar
        working-directory: apps/python-sidecar
        env:
          PYINSTALLER_CODESIGN_IDENTITY: "${{ matrix.platform == 'macos' && 'Developer ID Application: Jasper Zhu (H83XQSDL83)' || '' }}"
          PYINSTALLER_ENTITLEMENTS_FILE: "${{ matrix.platform == 'macos' && '../desktop/src-tauri/entitlements.plist' || '' }}"
        run: python build.py

      - name: Install Sidecar to Tauri binaries
        shell: bash
        run: |
          SRC_SIDECAR="apps/python-sidecar/dist/slash-sidecar-${{ matrix.target }}"
          DEST_DIR="apps/desktop/src-tauri/binaries"
          DEST_SIDECAR="$DEST_DIR/slash-sidecar-${{ matrix.target }}"
          
          # 1. 强力校验源侧边栏目录是否存在，不存在则抛出错误并使 workflow 失败
          if [ ! -d "$SRC_SIDECAR" ]; then
            echo "❌ [Error] Compiled sidecar directory not found: $SRC_SIDECAR"
            exit 1
          fi
          
          # 2. 清理可能残留的脏文件目标目录
          if [ -d "$DEST_SIDECAR" ]; then
            echo "🧹 [Clean] Removing existing sidecar at $DEST_SIDECAR"
            rm -rf "$DEST_SIDECAR"
          fi
          
          # 3. 复制
          mkdir -p "$DEST_DIR"
          cp -RP "$SRC_SIDECAR" "$DEST_DIR/"
          echo "✨ [Install] Sidecar installed successfully to $DEST_SIDECAR"

      - name: Verify Sidecar directory
        shell: bash
        run: |
          echo "=== Sidecar binaries ready for Tauri ==="
          ls -la apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/
          du -sh apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Node.js dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Recursively Codesign macOS Python Sidecar
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          SIDECAR_DIR="apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}"
          SIGN_IDENTITY="Developer ID Application: Jasper Zhu (H83XQSDL83)"

          echo "Signing macOS sidecar directory: $SIDECAR_DIR"

          if [ ! -d "$SIDECAR_DIR" ]; then
            echo "ERROR: sidecar directory not found: $SIDECAR_DIR"
            exit 1
          fi

          # 🎯 物理外科手术式斩首：抹除导致 codesign 格式模糊和苹果 Notarize 失败的唯一两个多余软链/伪物理文件
          echo "🧹 [Physical Excision] Removing redundant link files: Python & Python.framework/Python"
          rm -f "$SIDECAR_DIR/_internal/Python"
          rm -f "$SIDECAR_DIR/_internal/Python.framework/Python"

          echo "=== Step 1: Sign all physical Mach-O binaries ==="
          find "$SIDECAR_DIR" -type f | while IFS= read -r file; do
            # 1. 严格排除软链接，防止触发 ambiguous 报错
            if [ -L "$file" ]; then
              echo "⏭️ Skipping symlink: $file"
              continue
            fi

            # 2. 严格跳过所有处于 *.framework 内部、但不在 *.framework/Versions 目录下的文件
            # 为什么？因为这些文件在正统 Framework 结构中均是软链接，实体化后会触发 codesign 顽固的 ambiguous bundle 格式报错！
            # 真实的物理二进制绝对位于 Versions/ 子目录下！
            if [[ "$file" == */*.framework/* && ! "$file" == */*.framework/Versions/* ]]; then
              echo "⏭️ Skipping non-Versions framework file to prevent ambiguous error: $file"
              continue
            fi

            # 3. 只针对真实的 Mach-O 物理二进制执行强代码签名（含安全时间戳与运行时 Hardened Runtime）
            if file "$file" | grep -q "Mach-O"; then
              echo "🔒 Signing physical Mach-O: $file"
              codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$file"
            fi
          done

          echo "=== Step 2: Verify physical signatures ==="
          find "$SIDECAR_DIR" -type f | while IFS= read -r file; do
            if [ -L "$file" ]; then
              continue
            fi
            if [[ "$file" == */*.framework/* && ! "$file" == */*.framework/Versions/* ]]; then
              continue
            fi
            if file "$file" | grep -q "Mach-O"; then
              echo "Verifying: $file"
              codesign --verify --verbose=2 "$file"
            fi
          done

      - name: Diagnose macOS Environment and Install Global dmgbuild
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          echo "=== 1. Upgrade pip and Install Global dmgbuild ==="
          python3 -m pip install --upgrade pip
          python3 -m pip install dmgbuild ds-store mac-alias

          echo "=== 2. Resolve pip Script paths dynamically and Add to GITHUB_PATH ==="
          # 动态获取当前激活 Python 环境的 Script bin 目录以及用户自定义的 bin 目录，正统追加进系统的 $GITHUB_PATH
          SYS_BIN_DIR=$(python3 -c "import sys, os; print(os.path.join(sys.prefix, 'bin'))")
          USER_BIN_DIR=$(python3 -c "import site, os; print(os.path.join(site.USER_BASE, 'bin'))")
          echo "$SYS_BIN_DIR" >> $GITHUB_PATH
          echo "$USER_BIN_DIR" >> $GITHUB_PATH
          echo "Added $SYS_BIN_DIR and $USER_BIN_DIR to GITHUB_PATH"

          echo "=== 3. Diagnose dmgbuild Visibility (with temporary local PATH) ==="
          # 为了在当前 Step 内立即可用，手动将其导出至 PATH 中
          export PATH="$SYS_BIN_DIR:$USER_BIN_DIR:$PATH"
          which dmgbuild || true
          dmgbuild --version || true
          python3 -m pip show dmgbuild || true
          python3 -c "import dmgbuild; print(dmgbuild.__file__)" || true
          which python3
          python3 --version
          which osascript || true

          echo "=== 4. Test Run dmgbuild CLI directly to catch runtime dependency crashes ==="
          echo "filename = 'test_output.dmg'" > test_settings.py
          echo "volume_name = 'TestVolume'" >> test_settings.py
          dmgbuild -s test_settings.py 'TestVolume' test_output.dmg || true
          ls -la test_output.dmg || true

          echo "=== 5. Verify dmg-background image files ==="
          ls -lh apps/desktop/src-tauri/icons/dmg-background.png
          file apps/desktop/src-tauri/icons/dmg-background.png

          echo "=== 6. Verify tauri.conf.json DMG section ==="
          cat apps/desktop/src-tauri/tauri.conf.json | grep -A 20 '"dmg"'


      - name: Build Tauri Desktop App
        working-directory: apps/desktop
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # 显式且硬性地重新注入正确的 scripts 路径到本地 PATH 中，确保 tauri build 查找环境无懈可击
          SYS_BIN_DIR=$(python3 -c "import sys, os; print(os.path.join(sys.prefix, 'bin'))")
          USER_BIN_DIR=$(python3 -c "import site, os; print(os.path.join(site.USER_BASE, 'bin'))")
          export PATH="$SYS_BIN_DIR:$USER_BIN_DIR:$PATH"

          # 🎯 针对 macOS 强行仅构建 app 格式（绕过 Tauri 默认 DMG 并保护代码签名及公证过的 Slash.app 不被 Clean）
          if [ "${{ matrix.platform }}" = "macos" ]; then
            echo "🍏 macOS platform detected. Forcing Tauri bundle to 'app' only to preserve physical Slash.app..."
            pnpm tauri build --target ${{ matrix.rust-target }} --bundles app --config '{"bundle":{"resources":["binaries/slash-sidecar-${{ matrix.target }}"]}}'
          else
            echo "💻 Non-macOS platform. Building default bundle: ${{ matrix.bundle }}"
            pnpm tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle }} --config '{"bundle":{"resources":["binaries/slash-sidecar-${{ matrix.target }}"]}}'
          fi

      - name: Rebuild Beautified DMG with dmgbuild (macOS only)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. 物理定位编译好的 .app 和目标 .dmg
          APP_PATH="target/aarch64-apple-darwin/release/bundle/macos/Slash.app"
          DMG_DIR="target/aarch64-apple-darwin/release/bundle/dmg"
          
          # 确保目标输出目录存在
          mkdir -p "$DMG_DIR"
          
          # 计算规范的 DMG 文件名（保持与原 Tauri 产物命名一字不差）
          # 在 GitHub Actions push Tag 时，github.ref_name 对应版本号（如 v0.1.1-beta.22）
          # 我们提取出纯版本号（去除 v 前缀）以完全还原规范命名
          VERSION_NUM=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          TARGET_DMG="$DMG_DIR/Slash_${VERSION_NUM}_aarch64.dmg"
          
          echo "🎯 Target App Path: $APP_PATH"
          echo "🎯 Target DMG Path: $TARGET_DMG"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Error: Slash.app not found at $APP_PATH"
            exit 1
          fi
          
          # 2. 动态导出并强力调用 Python CLI 里的 dmgbuild
          SYS_BIN_DIR=$(python3 -c "import sys, os; print(os.path.join(sys.prefix, 'bin'))")
          USER_BIN_DIR=$(python3 -c "import site, os; print(os.path.join(site.USER_BASE, 'bin'))")
          export PATH="$SYS_BIN_DIR:$USER_BIN_DIR:$PATH"
          
          echo "🚀 Running dmgbuild to package premium DMG..."
          dmgbuild -s scripts/dmgbuild_settings.py \
            -D app_path="$APP_PATH" \
            -D background_path="apps/desktop/src-tauri/icons/dmg-background.png" \
            "Slash" \
            "$TARGET_DMG"
          
          echo "✨ Premium DMG generated successfully at $TARGET_DMG"
          
          # 3. 对全新生成的完美 DMG 容器重做安全时间戳和代码签名
          SIGN_IDENTITY="Developer ID Application: Jasper Zhu (H83XQSDL83)"
          echo "🔒 Signing the new beautified DMG..."
          codesign --force --timestamp --options runtime --sign "$SIGN_IDENTITY" "$TARGET_DMG"
          
          echo "✅ DMG rebuild and codesign flow COMPLETED!"

      - name: Create & Upload GitHub Release (Idempotent via gh CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "🚀 Creating release strictly and idempotently using GitHub CLI..."
          gh release create "${{ github.ref_name }}" \
            --title "Slash ${{ github.ref_name }}" \
            --prerelease \
            --notes "Slash Premium Beta Release with beautified macOS installer and native online updates." \
            || echo "ℹ️ Release already exists, proceeding to asset upload."

          echo "🚀 Listing and uploading matching release assets with --clobber..."
          # 使用 --clobber 选项强制覆盖已存在资产，规避并发和重复上传冲突
          find target -name "*.dmg" -o -name "*.exe" -o -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.zip" -o -name "*.zip.sig" | while read -r file; do
            if [ -f "$file" ]; then
              echo "⬆️ Uploading asset: $file ..."
              gh release upload "${{ github.ref_name }}" "$file" --clobber
            fi
          done
          echo "✅ All available assets successfully uploaded and finalized!"
