          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;color:#18181b;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:32px;box-sizing:border-box;"><div style="max-width:560px;"><h1 style="font-size:20px;margin:0 0 12px;">Slash failed to load</h1><p style="font-size:14px;line-height:1.6;margin:0;color:#52525b;">The application window is visible, but the frontend did not finish loading. Please export diagnostics or restart Slash.</p></div></div>';
        }
      }, 5000);
    </script>
