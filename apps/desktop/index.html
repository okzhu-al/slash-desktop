<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      function renderSlashBootMessage(title, message) {
        var root = document.getElementById('root');
        if (!window.__slashBootstrapped && root && (!root.hasChildNodes() || root.dataset.slashBootFallback === 'true')) {
          root.dataset.slashBootFallback = 'true';
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafafa;color:#18181b;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:32px;box-sizing:border-box;"><div style="max-width:560px;"><h1 style="font-size:20px;margin:0 0 12px;">' + title + '</h1><p style="font-size:14px;line-height:1.6;margin:0;color:#52525b;">' + message + '</p></div></div>';
        }
      }

      window.__slashBootSlowTimer = window.setTimeout(function () {
        renderSlashBootMessage('Slash is loading', 'The frontend is still starting. This can take longer on a cold Windows launch.');
      }, 12000);

      window.__slashBootFallback = window.setTimeout(function () {
        renderSlashBootMessage('Slash failed to load', 'The application window is visible, but the frontend did not finish loading. Please export diagnostics or restart Slash.');
      }, 45000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
