<svg width="660" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfdfd" />
      <stop offset="100%" stop-color="#f0f0f5" />
