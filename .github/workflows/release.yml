name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'apps/python-sidecar/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'


# ── Job 1: 构建 Python Sidecar ──
jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14             # Apple Silicon runner
            target: aarch64-apple-darwin
            python: '3.12'

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.12'

    runs-on: ${{ matrix.os }}
    name: Sidecar (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        working-directory: apps/python-sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build sidecar
        working-directory: apps/python-sidecar
        run: python build.py

      - name: Tar sidecar
        working-directory: apps/python-sidecar/dist
        run: tar -czf sidecar-${{ matrix.target }}.tar.gz slash-sidecar-${{ matrix.target }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: apps/python-sidecar/dist/sidecar-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ── Job 2: 构建 Tauri 桌面应用 ──
  build-app:
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            bundle: dmg

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.os }}
    name: App (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 下载对应平台的 sidecar 到 binaries/ 目录
      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: .

      - name: Extract sidecar artifact
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          tar -xzf sidecar-${{ matrix.target }}.tar.gz -C apps/desktop/src-tauri/binaries/

      - name: Verify sidecar
        shell: bash
        run: |
          echo "=== Sidecar binary ==="
          ls -la apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/
          du -sh apps/desktop/src-tauri/binaries/slash-sidecar-${{ matrix.target }}/

      - name: Build Tauri App
        working-directory: apps/desktop
        shell: bash
        run: pnpm tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle }} --config '{"bundle":{"resources":["binaries/slash-sidecar-${{ matrix.target }}"]}}'

      - name: Create Release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Slash ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            target/**/bundle/dmg/*.dmg
            target/**/bundle/nsis/*.exe

      # 上传构建产物
      - name: Upload build artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: slash-${{ matrix.target }}
          path: target/**/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: slash-${{ matrix.target }}
          path: target/**/bundle/nsis/*.exe
          if-no-files-found: warn
